<!DOCTYPE html>
<html lang="en">
<head>

    <!--
    noVNC example: lightweight example using minimal UI and features

    This is a self-contained file which doesn't import WebUtil or external CSS.

    Copyright (C) 2019 The noVNC authors
    noVNC is licensed under the MPL 2.0 (see LICENSE.txt)
    This file is licensed under the 2-Clause BSD license (see LICENSE.txt).

    Connect parameters are provided in query string:
        http://example.com/?host=HOST&port=PORT&scale=true
    -->
    <title>Bisup Console</title>

    <style>
        html {
            height: 100%;
        }
        body {
            margin: 0;
            min-height: 100%;
            overflow: hidden;
            background: #f5f4f8;
            color: #171327;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        }
        .console-shell {
            position: relative;
            z-index: 1;
            min-height: 100dvh;
            display: grid;
            grid-template-rows: auto 1fr;
            background: #f5f4f8;
        }
        #top_bar {
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 18px 12px 20px;
            background: #fff;
            border-top: 5px solid #ff5b00;
            border-bottom: 1px solid #ece8f6;
            box-shadow: 0 10px 28px rgba(45, 8, 123, 0.08);
            box-sizing: border-box;
        }
        .console-title {
            display: flex;
            align-items: center;
            gap: 11px;
            min-width: 0;
        }
        .console-mark {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            font-weight: 800;
            background: #ff5b00;
            color: #fff;
            box-shadow: 0 8px 18px rgba(255, 91, 0, 0.24);
        }
        .console-title-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .console-title-text strong {
            font-size: 14px;
            line-height: 1.2;
            font-weight: 700;
            color: #2d087b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .console-title-text span {
            margin-top: 2px;
            font-size: 12px;
            color: #7a7188;
        }
        .console-status {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        #status {
            font-size: 13px;
            font-weight: 650;
            color: #2d087b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: #ff8b4a;
            box-shadow: 0 0 0 4px rgba(255, 91, 0, 0.12);
            flex: 0 0 auto;
        }
        body.is-connected .status-dot {
            background: #00cf7a;
            box-shadow: 0 0 0 4px rgba(0, 207, 122, 0.22);
        }
        body.is-error .status-dot {
            background: #ff6b6b;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.16);
        }
        .console-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }
        .console-button {
            border: 1px solid #e4def6;
            border-radius: 7px;
            background: #fff;
            color: #2d087b;
            min-height: 34px;
            padding: 0 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0;
            cursor: pointer;
            transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        }
        .console-button:hover {
            background: #f4f1ff;
            border-color: #6354f4;
        }
        .console-button:active {
            transform: translateY(1px);
        }
        .console-button:focus-visible {
            outline: 2px solid #6354f4;
            outline-offset: 2px;
        }
        #sendCtrlAltDelButton {
            border-color: #6354f4;
            background: #6354f4;
            color: #fff;
            box-shadow: 0 8px 18px rgba(99, 84, 244, 0.22);
        }
        #sendCtrlAltDelButton:hover {
            background: #4e3bdd;
            border-color: #4e3bdd;
        }

        #screen {
            position: relative;
            overflow: hidden;
            display: grid;
            place-items: center;
            padding: 26px;
            box-sizing: border-box;
            background: #242426;
        }
        #screen canvas {
            max-width: 100%;
            max-height: calc(100dvh - 110px);
            border-radius: 4px;
            box-shadow:
                0 0 0 1px rgba(255, 91, 0, 0.22),
                0 22px 58px rgba(0, 0, 0, 0.36);
        }
        .console-watermark {
            position: fixed;
            left: 18px;
            bottom: 14px;
            z-index: 2;
            color: rgba(255, 255, 255, 0.58);
            font-size: 12px;
            pointer-events: none;
        }
        @media (max-width: 720px) {
            #top_bar {
                align-items: flex-start;
                flex-direction: column;
            }
            .console-actions {
                width: 100%;
                overflow-x: auto;
                padding-bottom: 2px;
            }
            #screen {
                padding: 14px;
            }
            .console-title-text span {
                display: none;
            }
        }

    </style>

    <script type="module" crossorigin="anonymous">
        // RFB holds the API to connect and communicate with a VNC server
        import RFB from './core/rfb.js';

        let rfb;
        let desktopName;

        // When this function is called we have
        // successfully connected to a server
        function connectedToServer(e) {
            document.body.classList.remove("is-error");
            document.body.classList.add("is-connected");
            status("Connected" + (desktopName ? " to " + desktopName : ""));
            reportDebug("connect-ok", { readyState: "connected" });
        }

        // This function is called when we are disconnected
        function disconnectedFromServer(e) {
            if (e.detail.clean) {
                status("Disconnected");
            } else {
                document.body.classList.add("is-error");
                document.body.classList.remove("is-connected");
                status("Connection closed");
            }
            reportDebug("disconnect", {
                clean: e.detail.clean ? "1" : "0",
                readyState: rfb ? rfb._rfbConnectionState : ""
            });
        }

        // When this function is called, the server requires
        // credentials to authenticate
        function credentialsAreRequired(e) {
            reportDebug("credentials-required", { readyState: rfb ? rfb._rfbConnectionState : "" });
            const password = prompt("Password required:");
            rfb.sendCredentials({ password: password });
        }

        // When this function is called we have received
        // a desktop name from the server
        function updateDesktopName(e) {
            desktopName = e.detail.name;
        }

        // Since most operating systems will catch Ctrl+Alt+Del
        // before they get a chance to be intercepted by the browser,
        // we provide a way to emulate this key sequence.
        function sendCtrlAltDel() {
            rfb.sendCtrlAltDel();
            return false;
        }

        // Show a status text in the top bar
        function status(text) {
            document.getElementById('status').textContent = text;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        function reconnectConsole() {
            window.location.reload();
        }

        function reportDebug(message, extra) {
            const token = readQueryVariable('debugtoken');
            if (!token) {
                return;
            }
            const body = new URLSearchParams();
            body.set('token', token);
            body.set('message', message);
            if (extra) {
                Object.keys(extra).forEach(key => body.set(key, normaliseConsoleValue(extra[key])));
            }
            fetch('../novnc_log.php', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString()
            }).catch(() => {});
        }

        // This function extracts the value of one variable from the
        // query string. If the variable isn't defined in the URL
        // it returns the default value instead.
        function readQueryVariable(name, defaultValue) {
            // A URL with a query parameter can look like this:
            // https://www.example.com?myqueryparam=myvalue
            //
            // Note that we use location.href instead of location.search
            // because Firefox < 53 has a bug w.r.t location.search
            const re = new RegExp('.*[?&]' + name + '=([^&#]*)'),
                  match = document.location.href.match(re);

            if (match) {
                // We have to decode the URL since want the cleartext value
                return decodeURIComponent(match[1]).replace(/&amp;/g, "&");
            }

            return defaultValue;
        }

        function normaliseConsoleValue(value) {
            if (!value) {
                return value;
            }
            let clean = String(value);
            const textarea = document.createElement("textarea");
            for (let i = 0; i < 3; i++) {
                textarea.innerHTML = clean;
                clean = textarea.value
                    .replace(/&amp;/gi, "&")
                    .replace(/&#38;/gi, "&")
                    .replace(/%26amp%3B/gi, "%26")
                    .replace(/&amp%3B/gi, "&");
            }
            return clean;
        }

        document.getElementById('sendCtrlAltDelButton')
            .onclick = sendCtrlAltDel;
        document.getElementById('fullscreenButton')
            .onclick = toggleFullscreen;
        document.getElementById('reconnectButton')
            .onclick = reconnectConsole;

        async function loadConnectionParams() {
            const token = readQueryVariable('debugtoken');
            if (token) {
                const response = await fetch('../novnc_params.php?token=' + encodeURIComponent(token), {
                    credentials: 'same-origin',
                    cache: 'no-store'
                });
                const payload = await response.json();
                if (!payload || !payload.success) {
                    throw new Error(payload && payload.message ? payload.message : 'Unable to prepare console.');
                }
                return {
                    host: payload.host || window.location.hostname,
                    port: payload.port || window.location.port,
                    path: normaliseConsoleValue(payload.path),
                    probePath: normaliseConsoleValue(payload.probePath || ""),
                    password: normaliseConsoleValue(payload.password || '')
                };
            }

            return {
                host: readQueryVariable('host', window.location.hostname),
                port: readQueryVariable('port', window.location.port),
                path: normaliseConsoleValue(readQueryVariable('path', 'websockify')),
                probePath: "",
                password: normaliseConsoleValue(readQueryVariable('password') || '')
            };
        }

        function buildWebsocketUrl(params) {
            let url = window.location.protocol === "https:" ? "wss" : "ws";
            url += "://" + params.host;
            if (params.port) {
                url += ":" + params.port;
            }
            url += "/" + params.path;
            return normaliseConsoleValue(url);
        }

        async function probeProxyAuth(path, configuredProbePath) {
            if (!configuredProbePath) {
                return;
            }
            const probePath = configuredProbePath || (path.split("/api2/json/")[0] + "/api2/json/version");
            try {
                const response = await fetch("/" + probePath, {
                    credentials: "include",
                    cache: "no-store"
                });
                reportDebug("proxy-auth-test", {
                    status: String(response.status),
                    ok: response.ok ? "1" : "0",
                    probePath: probePath
                });
            } catch (error) {
                reportDebug("proxy-auth-test", {
                    status: "fetch-error",
                    error: error && error.message ? error.message : String(error),
                    probePath: probePath
                });
            }
        }

        async function startConsole() {
            try {
                status("Connecting");
                reportDebug("connect-start", { readyState: "starting" });

                const params = await loadConnectionParams();
                const url = buildWebsocketUrl(params);
                await probeProxyAuth(params.path, params.probePath);
                reportDebug("connect-url", {
                    url: url,
                    path: params.path,
                    hasHtmlAmp: url.indexOf("&amp;") === -1 ? "0" : "1",
                    page: window.location.href
                });

                rfb = new RFB(document.getElementById('screen'), url,
                              { credentials: { password: params.password } });

                rfb.addEventListener("connect",  connectedToServer);
                rfb.addEventListener("disconnect", disconnectedFromServer);
                rfb.addEventListener("credentialsrequired", credentialsAreRequired);
                rfb.addEventListener("desktopname", updateDesktopName);

                rfb.viewOnly = readQueryVariable('view_only', false);
                rfb.scaleViewport = true;
                rfb.resizeSession = false;
                rfb.focusOnClick = true;
            } catch (error) {
                document.body.classList.add("is-error");
                status("Unable to prepare console");
                reportDebug("connect-error", {
                    error: error && error.message ? error.message : String(error),
                    page: window.location.href
                });
            }
        }

        startConsole();
    </script>
</head>

<body>
    <div class="console-shell">
    <div id="top_bar">
        <div class="console-title">
            <div class="console-mark">B</div>
            <div class="console-title-text">
                <strong>Bisup VPS console</strong>
                <span>Secure noVNC session</span>
            </div>
        </div>
        <div class="console-status">
            <span class="status-dot" aria-hidden="true"></span>
            <div id="status">Loading console</div>
        </div>
        <div class="console-actions">
            <button type="button" class="console-button" id="reconnectButton">Reconnect</button>
            <button type="button" class="console-button" id="fullscreenButton">Fullscreen</button>
            <button type="button" class="console-button" id="sendCtrlAltDelButton">Ctrl Alt Del</button>
        </div>
    </div>
    <div id="screen">
        <!-- This is where the remote screen will appear -->
    </div>
    <div class="console-watermark">my.bisup.com</div>
    </div>
</body>
</html>
